<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 620" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <style>
    .actor { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; }
    .actorText { font-size: 14px; font-weight: 700; fill: #1e1b4b; }
    .life { stroke: #a5b4fc; stroke-width: 1.5; stroke-dasharray: 4 3; }
    .msg { stroke: #374151; stroke-width: 1.6; fill: none; marker-end: url(#ah6); }
    .msgText { font-size: 12px; fill: #111827; }
    .highlight { fill: #dcfce7; stroke: #15803d; stroke-width: 2.5; }
    .highlightText { font-size: 16px; font-weight: 700; fill: #14532d; }
  </style>
  <defs>
    <marker id="ah6" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#374151" />
    </marker>
  </defs>
  <rect width="1050" height="620" fill="#ffffff"/>
  <text x="525" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">노트 보강 시 캐시 자동 갱신</text>

  <!-- actors -->
  <rect class="actor" x="20" y="55" width="140" height="40" rx="8"/>
  <text class="actorText" x="90" y="80" text-anchor="middle">노트 작성자</text>
  <rect class="actor" x="230" y="55" width="140" height="40" rx="8"/>
  <text class="actorText" x="300" y="80" text-anchor="middle">noteHash</text>
  <rect class="actor" x="440" y="55" width="140" height="40" rx="8"/>
  <text class="actorText" x="510" y="80" text-anchor="middle">generate</text>
  <rect class="actor" x="650" y="55" width="180" height="40" rx="8"/>
  <text class="actorText" x="740" y="80" text-anchor="middle">question_cache</text>
  <rect class="actor" x="880" y="55" width="140" height="40" rx="8"/>
  <text class="actorText" x="950" y="80" text-anchor="middle">Gemini flash</text>

  <line class="life" x1="90" y1="95" x2="90" y2="480"/>
  <line class="life" x1="300" y1="95" x2="300" y2="480"/>
  <line class="life" x1="510" y1="95" x2="510" y2="480"/>
  <line class="life" x1="740" y1="95" x2="740" y2="480"/>
  <line class="life" x1="950" y1="95" x2="950" y2="480"/>

  <!-- 1. 노트 보강 -->
  <path class="msg" d="M90,130 L300,130"/>
  <text class="msgText" x="195" y="122" text-anchor="middle">노트 보강</text>

  <!-- 2. noteHash 변경 -->
  <path class="msg" d="M300,130 L300,170"/>
  <text class="msgText" x="360" y="160">해시 재계산 → 변경</text>

  <!-- 3. 다음 조회: 300 -> 510 -->
  <path class="msg" d="M300,200 L510,200"/>
  <text class="msgText" x="405" y="192" text-anchor="middle">다음 조회 시 새 noteHash</text>

  <!-- 4. generate -> question_cache 조회 -->
  <path class="msg" d="M510,240 L740,240"/>
  <text class="msgText" x="625" y="232" text-anchor="middle">조회 (새 key)</text>
  <path class="msg" d="M740,270 L510,270"/>
  <text class="msgText" x="625" y="262" text-anchor="middle" font-weight="700" fill="#b91c1c">미스</text>

  <!--옛 행 cold -->
  <text class="msgText" x="740" y="300" text-anchor="middle" font-style="italic" fill="#6b7280">(옛 행은 cold 처리)</text>

  <!-- 5. generate -> Gemini 새 질문 생성 -->
  <path class="msg" d="M510,330 L950,330"/>
  <text class="msgText" x="730" y="322" text-anchor="middle">새 질문 생성 요청</text>
  <path class="msg" d="M950,360 L510,360"/>
  <text class="msgText" x="730" y="352" text-anchor="middle">응답</text>

  <!-- 6. upsert -->
  <path class="msg" d="M510,395 L740,395"/>
  <text class="msgText" x="625" y="387" text-anchor="middle">upsert (새 행)</text>

  <!-- highlight -->
  <rect class="highlight" x="230" y="440" width="600" height="60" rx="12"/>
  <text class="highlightText" x="530" y="478" text-anchor="middle">수동 캐시 관리 0 — noteHash가 캐시 무효화를 자동 트리거</text>
</svg>
