<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <style>
    .q { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; }
    .neo { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; }
    .final { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
    .qtext { font-size: 15px; font-weight: 700; fill: #713f12; }
    .label { font-size: 13px; font-weight: 700; }
    .yes { fill: #b91c1c; }
    .no { fill: #15803d; }
    .arrow { stroke: #4b5563; stroke-width: 2; fill: none; marker-end: url(#ah2); }
  </style>
  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4b5563" />
    </marker>
  </defs>
  <rect width="900" height="780" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">왜 Neo4j가 필요 없는가 — 의사결정 플로우</text>

  <!-- Q1 -->
  <polygon class="q" points="450,60 630,140 450,220 270,140"/>
  <text class="qtext" x="450" y="135" text-anchor="middle">노드 수</text>
  <text class="qtext" x="450" y="155" text-anchor="middle">백만+ ?</text>

  <path class="arrow" d="M630,140 L790,140"/>
  <text class="label yes" x="710" y="128" text-anchor="middle">예</text>
  <rect class="neo" x="670" y="150" width="200" height="60" rx="10"/>
  <text class="label" x="770" y="185" text-anchor="middle" fill="#b91c1c">그때 Neo4j 고려</text>

  <path class="arrow" d="M450,220 L450,290"/>
  <text class="label no" x="470" y="260">아니오</text>

  <!-- Q2 -->
  <polygon class="q" points="450,290 660,375 450,460 240,375"/>
  <text class="qtext" x="450" y="365" text-anchor="middle">복잡한 다단계</text>
  <text class="qtext" x="450" y="385" text-anchor="middle">그래프 질의 ?</text>

  <path class="arrow" d="M660,375 L790,375"/>
  <text class="label yes" x="725" y="363" text-anchor="middle">예</text>
  <rect class="neo" x="670" y="385" width="200" height="60" rx="10"/>
  <text class="label" x="770" y="420" text-anchor="middle" fill="#b91c1c">그때 Neo4j 고려</text>

  <path class="arrow" d="M450,460 L450,530"/>
  <text class="label no" x="470" y="500">아니오</text>

  <!-- Q3 -->
  <polygon class="q" points="450,530 660,610 450,690 240,610"/>
  <text class="qtext" x="450" y="600" text-anchor="middle">동시 편집 ·</text>
  <text class="qtext" x="450" y="620" text-anchor="middle">영속화 ?</text>

  <path class="arrow" d="M660,610 L790,610"/>
  <text class="label yes" x="725" y="598" text-anchor="middle">예</text>
  <rect class="neo" x="670" y="620" width="200" height="60" rx="10"/>
  <text class="label" x="770" y="655" text-anchor="middle" fill="#b91c1c">그때 Neo4j 고려</text>

  <path class="arrow" d="M450,690 L450,715"/>
  <text class="label no" x="470" y="705">아니오</text>

  <!-- final -->
  <rect class="final" x="180" y="715" width="540" height="55" rx="12"/>
  <text x="450" y="748" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">인메모리 graph.json으로 충분 (Neo4j 불필요)</text>
</svg>
